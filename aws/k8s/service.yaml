apiVersion: v1
kind: Service
metadata:
  name: llm-api
  namespace: llm
  annotations:
    # Network Load Balancer — cheaper than ALB, works for HTTP/HTTPS
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: llm-api
  ports:
    - name: http
      port: 80
      targetPort: 9000
